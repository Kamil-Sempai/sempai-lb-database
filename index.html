<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sempai · LB Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    :root {
      --navy:#151B3A; --accent:#3B7BFF; --accent-h:#2B68EE; --accent-glow:rgba(59,123,255,0.18);
      --bg:#F4F6FB; --bg-card:#FFFFFF; --bg-input:#F8F9FC;
      --text-1:#111827; --text-2:#4B5563; --text-3:#9CA3AF;
      --border:#E5E7EB; --border-2:#D1D5DB;
      --success:#10B981; --warning:#F59E0B; --danger:#EF4444;
      --sb-bg:#151B3A; --sb-text:rgba(255,255,255,0.6); --sb-text-a:#FFFFFF;
      --sb-hover:rgba(255,255,255,0.07); --sb-active:rgba(59,123,255,0.18); --sb-border:rgba(255,255,255,0.07);
      --font:'DM Sans',sans-serif; --r:10px; --r-lg:14px; --r-xl:20px;
      --shadow:0 1px 3px rgba(0,0,0,0.06); --shadow-lg:0 10px 40px rgba(0,0,0,0.14); --t:0.18s ease;
    }
    [data-theme="dark"] {
      --bg:#0C0F1D; --bg-card:#131729; --bg-input:#1A1F35;
      --text-1:#F1F3F9; --text-2:#8B95B0; --text-3:#4B5568;
      --border:#1F2640; --border-2:#2A3252; --sb-bg:#090C19; --sb-border:rgba(255,255,255,0.05);
      --shadow:0 1px 3px rgba(0,0,0,0.3); --shadow-lg:0 10px 40px rgba(0,0,0,0.55);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);background:var(--bg);color:var(--text-1);min-height:100vh;transition:background var(--t),color var(--t);-webkit-font-smoothing:antialiased}
    a{text-decoration:none;color:inherit} button{font-family:var(--font)} img{display:block}
    ::-webkit-scrollbar{width:5px;height:5px} ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:99px}
    .logo-svg path{fill:#FFFFFF}
  </style>
</head>
<body>
<script>
  window.addEventListener('load',()=>{
    document.body.innerHTML = '<div style="font-family:sans-serif;padding:40px;text-align:center"><h2>Trwa przywracanie...</h2><p>Poczekaj na pełne wgranie pliku.</p></div>';
  });
</script>
</body>
</html>
